<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Password Strength Checker</h1>

        <div class="password-box">
            <input type="password" id="password" placeholder="Enter password">
            <span id="togglePassword">👁</span>
        </div>

        <p id="strengthText">Strength: Weak</p>

        <div class="strength-bar">
            <div id="strengthFill"></div>
        </div>

        <ul id="requirements">
            <li id="length">Use at least 8 characters</li>
            <li id="upper">Add an uppercase letter</li>
            <li id="lower">Add a lowercase letter</li>
            <li id="number">Add a number</li>
            <li id="special">Add a special character</li>
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
